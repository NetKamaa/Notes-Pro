<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes-Pro</title>
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <div class="container app">
      <h1>Notes</h1>
      <form action="" class="form-ForNewNote">
        <h2>New Note</h2>

        <label for="title" class="visually-hidden">Title</label>
        <input id="title" name="title" placeholder="Title" />
        <label for="text" class="visually-hidden">Text</label>
        <textarea id="textarea-Text" name="text" placeholder="Text"></textarea>

        <button class="btn-AddNewNote">Add</button>
      </form>

      <form action="" class="form-ForSortQuery">
        <select name="" class="sort"></select>
        <input type="text" class="query-title" placeholder="Name of note" />
        <button class="reset">Reset</button>
      </form>

      <div class="error" aria-live="polite"></div>

      <div class="notes-list"></div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
